<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="WEB-INF/templates/layout.xhtml">

    <ui:define name="content">

        <h2>Neue Veranstaltung anlegen</h2>
        <h:form id="createEventForm">

            <h:panelGrid id="createEventGrid" columns="2">

                <h:outputLabel for="name" value="Name"/>
                <h:panelGroup id="nameGroup">
                    <h:inputText id="name"
                                 value="#{eventController.newEvent.name}"
                                 required="true"/>
                    <h:message for="name" styleClass="field-error"/>
                </h:panelGroup>

                <h:outputLabel for="location" value="Ort"/>
                <h:panelGroup id="locationGroup">
                    <h:inputText id="location"
                                 value="#{eventController.newEvent.location}"
                                 required="true"/>
                    <h:message for="location" styleClass="field-error"/>
                </h:panelGroup>

                <h:outputLabel for="date" value="Datum"/>
                <h:panelGroup id="dateGroup">
                    <h:inputText id="date"
                                 value="#{eventController.newEvent.date}"
                                 required="true"/>
                    <h:message for="date" styleClass="field-error"/>
                </h:panelGroup>

                <h:outputLabel for="state" value="Status"/>
                <h:panelGroup id="stateGroup">
                    <h:selectOneMenu id="state"
                                     value="#{eventController.newEvent.state}">
                        <f:selectItems value="#{eventController.availableStatuses}"/>
                    </h:selectOneMenu>
                    <h:message for="state" styleClass="field-error"/>
                </h:panelGroup>

            </h:panelGrid>

            <br/>

            <h:commandButton id="save"
                             value="Speichern"
                             action="#{eventController.saveEvent}"/>

        </h:form>

    </ui:define>

</ui:composition>
</html>
