<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>Konferenzverwaltung</title>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>
    <h:messages id="messages" redisplay="false" />
    <header>
        <h:graphicImage value="https://www.iu.de/logos/iu-logo.svg" width="150px"/>
        <h1>Konferenzverwaltung</h1>
        <nav>
            <h:link value="Start" outcome="index"/>
            <h:panelGroup rendered="#{authController.loggedIn}">
                |
                <h:link value="Veranstaltungen" outcome="events"/>
                |
                <h:link value="Neue Veranstaltung" outcome="create-event"/>
                |
                <h:outputText value="Angemeldet als #{authController.currentUser.username}"/>
                |
                <h:form id="logoutForm" styleClass="nav-inline-form">
                    <h:commandButton id="logout" value="Logout" action="#{authController.logout}" styleClass="nav-menu-button"/>
                </h:form>
            </h:panelGroup>
            <h:panelGroup rendered="#{not authController.loggedIn}">
                |
                <h:link value="Login" outcome="login"/>
                |
                <h:link value="Registrieren" outcome="register"/>
            </h:panelGroup>
        </nav>
    </header>

    <main>
        <ui:insert name="content"/>
    </main>

    <footer>
        <p>DSBPIIJEE01 - Programmierung industrieller Informationssysteme mit Java EE - SoSe 2026</p>
    </footer>

</h:body>
</html>
