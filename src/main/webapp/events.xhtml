<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<ui:composition template="WEB-INF/templates/layout.xhtml">

  <ui:define name="content">

    <h1>Veranstaltungen</h1>

    <h:dataTable styleClass="event-table"
                 id="eventsTable"
                 value="#{eventController.events}"
                 var="event">

      <h:column>
        <f:facet name="header">Event</f:facet>
        #{event.name}
      </h:column>

      <h:column>
        <f:facet name="header">Ort</f:facet>
        #{event.location}
      </h:column>

      <h:column>
        <f:facet name="header">Datum</f:facet>
        #{event.date}
      </h:column>

      <h:column>
        <f:facet name="header">Status</f:facet>
        #{event.state}
      </h:column>

      <h:column>
        <f:facet name="header">Status</f:facet>
        <h:selectOneMenu id="state" value="#{event.state}">
          <f:selectItems value="#{eventController.availableStatuses}"/>
        </h:selectOneMenu>
        <h:message for="state"/>
      </h:column>
    </h:dataTable>

    <br></br>
    <h:button id="createEvent"
              value="Neue Veranstaltung anlegen"
              outcome="create-event"/>
  </ui:define>

</ui:composition>

</html>
