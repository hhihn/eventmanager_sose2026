<!DOCTYPE html>
<html   lang="en"
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html">

<ui:composition template="WEB-INF/templates/layout.xhtml">

    <ui:define name="content">
        <div class="info-box">
            <h:panelGroup rendered="#{authController.loggedIn}">
                <p class="success">Angemeldet als #{authController.currentUser.username}.</p>
            </h:panelGroup>
            <h:panelGroup rendered="#{not authController.loggedIn}">
                <p class="success">Willkommen. Bitte einloggen oder registrieren.</p>
            </h:panelGroup>
        </div>

        <h:form id="indexForm">
            <h:commandButton value="Seite neu laden" styleClass="nav-menu-button" id="reload"/>
        </h:form>

        <h:outputLink value="#{request.contextPath}/hello-servlet">
            <h:outputText value="Servlet aufrufen"/>
        </h:outputLink>

    </ui:define>

</ui:composition>

</html>
