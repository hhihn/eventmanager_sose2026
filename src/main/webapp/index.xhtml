<!DOCTYPE html>
<html   lang="en"
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html">

<ui:composition template="WEB-INF/templates/layout.xhtml">

    <ui:define name="content">
        <div class="info-box">
            <p class="success">JSF funktioniert!</p>
        </div>

        <h2>Nächste Schritte:</h2>
        <ul>
            <li>Entities erstellen (Veranstaltung, Session, Teilnehmer)</li>
            <li>Management Beans anlegen</li>
            <li>Views implementieren</li>
        </ul>

        <h:form id="indexForm">
            <h:commandButton value="Seite neu laden" styleClass="nav-menu-button" id="reload"/>
        </h:form>

        <h:outputLink value="#{request.contextPath}/hello-servlet">
            <h:outputText value="Servlet aufrufen"/>
        </h:outputLink>

    </ui:define>

</ui:composition>

</html>
